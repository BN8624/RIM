# ---------------------------------------------------------------- Contracts (§14.1)
# 고위험 외부·단계 간 계약만. schema 필드는 복제하지 않는다 — owner symbol을 직접 읽게 한다.

[[contracts]]
id = "core_contract"
owner_symbol = "repo_idea_miner.factory_core_schemas.CoreContract"
consumer_symbols = ["repo_idea_miner.factory_core_pipeline.run_core_factory"]
validator_symbols = ["repo_idea_miner.factory_validate.validate_core_run_dir"]
canon_ids = ["CANON-04"]
compatibility = "backward-readable"
risk = "high"

[[contracts]]
id = "output_representation"
owner_symbol = "repo_idea_miner.factory_core_schemas.OutputRepresentation"
consumer_symbols = ["repo_idea_miner.factory_core_pipeline.run_core_factory"]
validator_symbols = ["repo_idea_miner.factory_core_gates.lint_golden_representation"]
canon_ids = ["CANON-04"]
compatibility = "harness_schema_version<2 runs keep lenient lint (NOT_DECLARED allowed)"
risk = "high"

[[contracts]]
id = "golden_representation"
owner_symbol = "repo_idea_miner.factory_core_schemas.ScenarioGoldenOutput"
consumer_symbols = ["repo_idea_miner.factory_core_gates.lint_golden_representation"]
validator_symbols = ["repo_idea_miner.factory_validate.validate_core_run_dir"]
canon_ids = ["CANON-04"]
compatibility = "backward-readable"
risk = "high"

[[contracts]]
id = "runner_result"
owner_symbol = "repo_idea_miner.factory_core_schemas.RunnerContract"
consumer_symbols = ["repo_idea_miner.factory_core_pipeline.run_core_factory"]
validator_symbols = ["repo_idea_miner.factory_validate.validate_core_run_dir"]
canon_ids = ["CANON-04"]
compatibility = "runner stdout stays ASCII-safe JSON"
risk = "high"

[[contracts]]
id = "continuation_summary"
owner_symbol = "repo_idea_miner.factory_continue.run_continuation"
consumer_symbols = ["repo_idea_miner.factory_queue.run_continuation_queue"]
validator_symbols = ["repo_idea_miner.factory_validate.validate_continuation_run_dir"]
canon_ids = ["CANON-05"]
compatibility = "pre-2A runs stay readable (inferred_lane)"
risk = "high"

[[contracts]]
id = "repair_execution_result"
owner_symbol = "repo_idea_miner.factory_spec_repair.run_spec_repair_apply"
consumer_symbols = ["repo_idea_miner.factory_queue.run_continuation_queue"]
validator_symbols = ["repo_idea_miner.factory_validate.run_marker_validators"]
canon_ids = ["CANON-05"]
compatibility = "backward-readable"
risk = "high"

[[contracts]]
