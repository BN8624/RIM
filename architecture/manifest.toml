]
validator_symbols = ["repo_idea_miner.factory_validate.run_marker_validators"]
canon_ids = ["CANON-06", "CANON-07"]
compatibility = "backward-readable"
risk = "high"

[[contracts]]
id = "product_decision"
owner_symbol = "repo_idea_miner.factory_autopilot_schemas.UnifiedDecisionPacket"
consumer_symbols = [
  "repo_idea_miner.factory_product_loop.run_product_loop",
