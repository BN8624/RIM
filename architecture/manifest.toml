# ---------------------------------------------------------------- Invariants (§14.2)
# 의미 전문은 PROJECT_CANON에만 둔다. canon_id 섹션의 INVARIANTS 리스트가 id를 포함해야 한다.
# tests는 tests/<stem>.py 모듈 stem — check가 실재를 검증한다.

[[invariants]]
id = "INV-MINER-CORE-PRESERVED"
canon_id = "CANON-01"
applies_to = [
  "repo_idea_miner.pipeline.run_single_repo",
  "repo_idea_miner.search_pipeline.run_search",
]
tests = ["test_pipeline_mock", "test_dependency"]

[[invariants]]
